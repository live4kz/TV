<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | مباراة العراق ضد أندورا</title>
    
    <!-- مكتبة تشغيل m3u8 لمتصفح كروم -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    
    <!-- خط القاهرة الاحترافي -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b0f19, #1e293b);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 1.7rem;
            margin-bottom: 8px;
            color: #f1f5f9;
        }

        .badge {
            display: inline-block;
            background-color: #ef4444;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* حاوية مشغل الفيديو الكروم المتجاوب */
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            background-color: #000;
            aspect-ratio: 16 / 9;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        /* زر التليجرام */
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            padding: 14px 35px;
            background: linear-gradient(135deg, #0088cc, #00a2ed);
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 136, 204, 0.4);
            width: 100%;
        }

        .telegram-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 136, 204, 0.7);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 بث مباشر مباراة العراق ضد أندورا</h1>
        <div class="badge">🔴 جاري البث الآن - اضغط تشغيل</div>

        <!-- المشغل المطور الذكي -->
        <div class="video-wrapper">
            <div id="player"></div>
        </div>

        <!-- زر التليجرام الخاص بك -->
        <a href="https://t.me/live4kz" target="_blank" class="telegram-btn">
            📢 انضم لقناتنا على التليجرام لمتابعة المباراة
        </a>

        <div class="footer">
            اضغط على زر التشغيل في المنتصف لبدء البث فوراً • © 2026
        </div>
    </div>

    <script>
        // رابط بثك تم تثبيته برمجياً ليعمل مباشرة بدون أي شاشات مكسورة
        const rawStreamUrl = "http://89.47.232.196:8080/live/Waielxsafwatx/sm03111206/5932.m3u8?token=cdcHcU.Uycy.X.dcXz.yczHbdcU.X.y.IQ.m3u8.e4e6ba6d83e7d5ce3589a8f26b059b822d77331b750b9386d4d866dbf612856d...YXJvbWF0di5jbw==";

        var player = new Clappr.Player({
            source: rawStreamUrl,
            parentId: "#player",
            width: "100%",
            height: "100%",
            autoPlay: false,
            mimeType: "application/x-mpegURL"
        });
    </script>
</body>
</html>
