<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبرمج لايف | منصة البث الموحدة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7c3aed;
            --dark-core: #030712;
            --card-bg: rgba(17, 24, 39, 0.75);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #111827 0%, var(--dark-core) 80%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* شريط الإعلانات الفخم المتحرك */
        .marquee-container {
            width: 100%;
            max-width: 850px;
            background: linear-gradient(90deg, #dc2626, #ef4444, #dc2626);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 25px;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
        }

        .marquee-text {
            display: inline-block;
            font-weight: 900;
            font-size: 1.05rem;
            animation: slide 15s linear infinite;
        }

        @keyframes slide {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* كارت المباراة السينمائي التفاعلي المحسن */
        .match-card {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .flag-frame {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.25);
        }

        .flag-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .team-name {
            font-size: 1.2rem;
            font-weight: 900;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        .vs-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .vs-badge {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            color: #000;
            font-size: 1.3rem;
            font-weight: 900;
            padding: 6px 22px;
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
        }

        .live-status {
            font-size: 0.85rem;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(34, 197, 94, 0.3);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* مسرح عرض المشغل الاحترافي */
        .player-theatre {
            width: 100%;
            max-width: 850px;
            background: #000000;
            border-radius: 24px;
            padding: 6px;
            border: 2px solid #1f2937;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            margin-bottom: 25px;
        }

        /* تكييف Video.js ليكون متوافقاً مع كل الشاشات والهواتف */
        .video-js {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            border-radius: 18px;
            overflow: hidden;
        }

        /* حاوية الزر الموحد */
        .single-quality-container {
            width: 100%;
            max-width: 850px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        /* الزر الرئيسي الموحد الفخم والمضيء */
        .main-source-btn {
            background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-blue) 100%);
            color: #000000;
            border: none;
            padding: 16px 40px;
            border-radius: 18px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 242, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            justify-content: center;
        }

        .main-source-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(124, 58, 237, 0.5);
            opacity: 0.95;
        }

        /* زر قناة التليكرام VIP */
        .telegram-vip-box {
            width: 100%;
            max-width: 850px;
            text-align: center;
        }

        .telegram-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #0088cc 0%, #24a1de 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.25rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(36, 161, 222, 0.35);
            transition: all 0.3s ease;
        }

        .telegram-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(36, 161, 222, 0.55);
            color: #ffffff;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #4b5563;
        }

        @media (max-width: 768px) {
            .match-card { padding: 15px 10px; }
            .flag-frame { width: 65px; height: 65px; }
            .team-name { font-size: 1rem; }
            .vs-badge { font-size: 1.1rem; padding: 5px 18px; }
            .main-source-btn { font-size: 1rem; padding: 14px 25px; width: 100%; }
            .telegram-button { font-size: 1.1rem; padding: 15px 25px; }
        }
    </style>
</head>
