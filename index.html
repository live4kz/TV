<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | العراق ضد أندورا</title>
    <!-- استدعاء مشغل HLS القوي -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #0f172a; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* شعار القناة المتحرك */
        .channel-logo-marquee {
            width: 100%;
            background: #ef4444;
            color: white;
            padding: 10px 0;
            text-align: center;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }
        .marquee-text {
            display: inline-block;
            animation: marquee 10s linear infinite;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* حاوية الفيديو */
        .video-container { width: 100%; max-width: 800px; margin-top: 20px; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; }

        /* زر التليكرام */
        .tg-link { margin-top: 20px; padding: 15px 30px; background: #229ED9; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- الشعار المتحرك -->
    <div class="channel-logo-marquee">
        <div class="marquee-text">تابع قناة "المبرمج لايف" على تليكرام للمزيد من البثوث الحصرية! 🔴</div>
    </div>

    <div class="video-container">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <a href="https://t.me/live4kz" class="tg-link">اشترك في قناة التليكرام للمبرمج لايف</a>

    <script>
        var video = document.getElementById('video');
        var videoSrc = 'http://93.113.203.50:8080/live/10176934593385/IxTopXNJ2oKhJy/542435.m3u8?token=bUbUbU.yzHaabb.X.yfaUcUH.yczHbdcU.X.y.IQ.m3u8.562c4c16cb3583eafaa32a226516862b9f73fa35fed145225047d952597c2163...ZGFycHJvNGsuY29tOjgwODA=';
        
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
