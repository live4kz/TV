<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر | العراق ضد أندورا</title>
    
    <!-- خط Cairo الاحترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- مكتبة مشغل الفيديو الفخم Plyr ومستند HLS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e1b4b, #090514);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* شريط الشعار المتحرك الاحترافي */
        .marquee-container {
            width: 100%;
            max-width: 950px;
            background: linear-gradient(90deg, #dc2626, #991b1b);
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            animation: marquee 12s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* كارت المباراة الضخم */
        .match-card-hub {
            width: 100%;
            max-width: 950px;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .team-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .flag-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }

        .flag-wrapper:hover {
            transform: scale(1.1);
        }

        .flag-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .team-title {
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .center-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .vs-badge-giant {
            background: linear-gradient(45deg, #e11d48, #f59e0b);
            font-size: 1.5rem;
            font-weight: 900;
            padding: 8px 25px;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.6);
            border: 2px solid #fff;
        }

        .live-status {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-pulse-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse-glow 1.5s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* حاوية المشغل الفخم */
        .player-theater {
            width: 100%;
            max-width: 950px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            margin-bottom: 25px;
        }

        /* تخصيص مظهر مشغل Plyr */
        .plyr {
            --plyr-color-main: #3b82f6; /* لون أزرار التحكم أزرق فخم */
            aspect-ratio: 16 / 9;
        }

        /* سياق زر التليكرام الضخم */
        .telegram-vip-box {
            width: 100%;
            max-width: 950px;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.8));
            border: 2px dashed #229ED9;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .telegram-vip-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(45deg, #0088cc, #24a1de);
            color: #ffffff;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.3rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(36, 161, 222, 0.4);
            width: 100%;
            max-width: 550px;
        }

        .telegram-vip-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(36, 161, 222, 0.6);
        }

        .vip-notice {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* التوافق التام مع الموبايل والشاشات الصغيرة */
        @media (max-width: 600px) {
            .match-card-hub { padding: 15px; gap: 10px; }
            .flag-wrapper { width: 65px; height: 65px; border-width: 2px; }
            .team-title { font-size: 1rem; }
            .vs-badge-giant { font-size: 1rem; padding: 5px 15px; }
            .telegram-vip-btn { font-size: 1rem; padding: 14px 25px; }
            .marquee-text { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- الشعار المتحرك التابع لقناتك -->
    <div class="marquee-container">
        <div class="marquee-text">🔥 تابع قناة "المبرمج لايف" على تليكرام لتغطية الأهداف فور حدوثها والملخصات بجودة عالية! 🔥</div>
    </div>

    <!-- كارت المباراة الضخم والجميل -->
    <div class="match-card-hub">
        <!-- منتخب العراق -->
        <div class="team-block">
            <div class="flag-wrapper">
                <img src="https://flagcdn.com/w256/iq.png" alt="علم العراق">
            </div>
            <div class="team-title">العراق</div>
        </div>

        <!-- المركز -->
        <div class="center-hub">
            <div class="vs-badge-giant">VS</div>
            <div class="live-status">
                <span class="live-pulse-dot"></span> بث مباشر
            </div>
        </div>

        <!-- منتخب أندورا -->
        <div class="team-block">
            <div class="flag-wrapper">
                <img src="https://flagcdn.com/w256/ad.png" alt="علم أندورا">
            </div>
            <div class="team-title">أندورا</div>
        </div>
    </div>

    <!-- مشغل الفيديو الـ VIP الفخم -->
    <div class="player-theater">
        <video id="player" controls playsinline autoplay poster="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200"></video>
    </div>

    <!-- قسم تليكرام المبرمج لايف للأهداف -->
    <div class="telegram-vip-box">
        <p class="vip-notice">فاتك الهدف؟ لا تشيل هم، الأهداف والإعادات ننشرها بقناتنا فوراً:</p>
        <a href="https://t.me/live4kz" target="_blank" class="telegram-vip-btn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM16.64 8.8C16.49 9.38 13.51 21.31 13.51 21.31C13.51 21.31 13.35 21.73 12.94 21.7C12.53 21.67 11.95 21.27 11.95 21.27C11.95 21.27 7.02 18.06 5.3 16.52C4.85 16.12 5.16 15.41 5.16 15.41C5.16 15.41 9.49 11.33 11.77 9.14C12.08 8.84 11.9 8.66 11.53 8.89C10.61 9.47 5.11 13.01 5.11 13.01C5.11 13.01 4.54 13.36 3.65 13.1C2.76 12.84 1.83 12.54 1.83 12.54C1.83 12.54 1.15 12.11 2.37 11.62C5.35 10.43 15.07 6.42 16.15 5.97C16.89 5.66 17.06 5.8 16.97 6.41C16.86 7.15 16.64 8.8 16.64 8.8Z" fill="currentColor"/>
            </svg>
            اضغط هنا للاشتراك في قناة المبرمج لايف
        </a>
    </div>

    <!-- سكريبت التشغيل الذكي والربط بالرابط الجديد -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const source = "http://205.237.105.25:8080/live/10176934593385/IxTopXNJ2oKhJy/255639.m3u8?token=bUbUbU.UcXz.X.Uayd.yczHbdcU.X.y.IQ.m3u8.24fe724a2fcdef2fb8bc4c37dd9fbd0b521ef750c0d4b3c59d40ae4941a57359...ZGFycHJvNGsuY29tOjgwODA=";
            const video = document.getElementById('player');
            
            // خيارات المشغل الفخم الافتراضية
            const defaultOptions = {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                tooltips: { controls: true, seek: true }
            };

            if (Hls.isSupported()) {
                const hls = new Hls({
                    maxMaxBufferLength: 10, // تقليل التقطيع وزيادة سرعة التحميل
                    enableWorker: true
                });
                hls.loadSource(source);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    const player = new Plyr(video, defaultOptions);
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // دعم متصفح سفاري على الآيفون والماك تلقائياً
                video.src = source;
                const player = new Plyr(video, defaultOptions);
            }
        });
    </script>
</body>
</html>
