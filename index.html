<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بث مباشر | العراق ضد أندورا</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- HLS PLAYER -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Cairo',sans-serif;
color:white;
overflow-x:hidden;
}

/* خلفية احترافية */
body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top right,#00ff8840 0%,transparent 30%),
radial-gradient(circle at bottom left,#19875450 0%,transparent 30%),
#000;
z-index:-1;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
padding:20px;
}

/* عنوان */
.header{
text-align:center;
padding:20px 0;
}

.header h1{
font-size:38px;
font-weight:800;
color:#fff;
text-shadow:0 0 25px #00ff88;
}

.live{
display:inline-block;
margin-top:12px;
padding:8px 20px;
background:red;
border-radius:50px;
font-weight:700;
animation:pulse 1s infinite;
}

/* مشغل */
.player-box{
margin-top:25px;
background:#0c0c0c;
border-radius:25px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 40px rgba(0,255,136,0.15);
}

video{
width:100%;
height:auto;
background:#000;
}

/* أزرار */
.actions{
display:flex;
justify-content:center;
gap:15px;
padding:25px;
flex-wrap:wrap;
}

.btn{
padding:14px 28px;
border-radius:14px;
text-decoration:none;
font-size:17px;
font-weight:700;
transition:0.3s;
}

.telegram{
background:#0088cc;
color:white;
box-shadow:0 0 20px rgba(0,136,204,.4);
}

.telegram:hover{
transform:translateY(-4px);
background:#00a2ff;
}

.reload{
background:#198754;
color:white;
border:none;
cursor:pointer;
box-shadow:0 0 20px rgba(25,135,84,.4);
}

.reload:hover{
transform:translateY(-4px);
background:#20c997;
}

/* رسالة */
.status{
text-align:center;
padding:15px;
font-size:15px;
color:#ccc;
}

/* لودر */
.loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
border:6px solid rgba(255,255,255,.2);
border-top:6px solid #00ff88;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

.player-wrapper{
position:relative;
}

/* انيميشن */
@keyframes spin{
100%{
transform:translate(-50%,-50%) rotate(360deg);
}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

@media(max-width:768px){

.header h1{
font-size:28px;
}

.btn{
width:90%;
text-align:center;
}

}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🇮🇶 العراق ضد أندورا 🇦🇩</h1>
<div class="live">● LIVE</div>
</div>

<div class="player-box">

<div class="player-wrapper">

<div class="loader" id="loader"></div>

<video
id="video"
controls
autoplay
playsinline
muted
></video>

</div>

<div class="status" id="status">
جاري تشغيل البث...
</div>

<div class="actions">

<a href="https://t.me/live4kz"
target="_blank"
class="btn telegram">
قناة التلكرام
</a>

<button class="btn reload" onclick="reloadPlayer()">
تحديث البث
</button>

</div>

</div>

</div>

<script>

const video = document.getElementById('video');
const loader = document.getElementById('loader');
const statusText = document.getElementById('status');

/* رابط البث */
const stream = "http://205.237.105.25:8080/live/10176934593385/IxTopXNJ2oKhJy/255639.m3u8?token=bUbUbU.UcXz.X.Uayd.yczHbdcU.X.y.IQ.m3u8.24fe724a2fcdef2fb8bc4c37dd9fbd0b521ef750c0d4b3c59d40ae4941a57359...ZGFycHJvNGsuY29tOjgwODA=";

function startPlayer(){

loader.style.display = "block";

if(Hls.isSupported()){

const hls = new Hls({
enableWorker:true,
lowLatencyMode:true,
backBufferLength:90
});

hls.loadSource(stream);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

loader.style.display = "none";

statusText.innerHTML = "البث يعمل الآن بجودة عالية ✅";

video.play();

});

hls.on(Hls.Events.ERROR,function(event,data){

if(data.fatal){

statusText.innerHTML = "حدث خطأ بالبث ❌ حاول التحديث";

}

});

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src = stream;

video.addEventListener('loadedmetadata',function(){

loader.style.display = "none";

statusText.innerHTML = "البث يعمل الآن ✅";

video.play();

});

}else{

statusText.innerHTML = "المتصفح لا يدعم تشغيل البث";

}

}

/* إعادة تحميل */
function reloadPlayer(){

location.reload();

}

startPlayer();

</script>

</body>
</html>
