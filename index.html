
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | العراق ضد أندورا</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .main-wrapper {
            width: 100%;
            max-width: 800px;
            margin-top: 10px;
        }

        /* كارت المباراة والأعلام */
        .match-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .team {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .flag-box {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
        }

        .flag-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: #f8fafc;
        }

        .vs-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 80px;
        }

        .vs-badge {
            background: linear-gradient(45deg, #ef4444, #f59e0b);
            padding: 4px 15px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            animation: pulse 2s infinite;
        }

        .live-text {
            color: #22c55e;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite;
        }

        /* حاوية المشغل السريع */
        .player-wrapper {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            position: relative;
            margin-bottom: 20px;
        }

        #player {
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        /* زر التليكرام الأنيق والسريع */
        .telegram-section {
            text-align: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px dashed #229ED9;
            padding: 20px;
            border-radius: 20px;
        }

        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(45deg, #0088cc, #24a1de);
            color: #fff;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(36, 161, 222, 0.4);
            width: 100%;
            max-width: 450px;
        }

        .telegram-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(36, 161, 222, 0.6);
        }

        .info-text {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        /* حركات الأنيميشن */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        /* توافق الشاشات الصغيرة للموبايل */
        @media (max-width: 480px) {
            .flag-box { width: 60px; height: 60px; }
            .team-name { font-size: 0.95rem; }
            .vs-badge { font-size: 0.9rem; padding: 3px 10px; }
            .telegram-btn { font-size: 1rem; padding: 12px 20px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="match-card">
            <div class="team">
                <div class="flag-box">

                </div>
                <div class="team-name">العراق</div>
            </div>

            <div class="vs-box">
                <div class="vs-badge">VS</div>
                <div class="live-text">
                    <span class="live-dot"></span> مباشر الآن
                </div>
            </div>

            <div class="team">
                <div class="flag-box">
                    <img src="https://flagcdn.com/w160/ad.png" alt="علم أندورا">
                </div>
                <div class="team-name">أندورا</div>
            </div>
        </div>

        <div class="player-wrapper">
            <div id="player"></div>
        </div>

        <div class="telegram-section">
            <p class="info-text">شاهدت هدف وتريد تراجع اللقطة؟ الأهداف والملخصات ننشرها فوراً هنا:</p>

    </div>

</body>
</html>
