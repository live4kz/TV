<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبرمج لايف | بث الجودة الفائقة</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- استدعاء المكتبة الخارقة لتشغيل روابط m3u8 بدقة وبدون مشاكل -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --abood-gold: #ffcf33;
            --abood-cyan: #00f2ff;
            --abood-purple: #8e2de2;
            --main-bg: #040609;
        }

        body {
            background-color: var(--main-bg);
            background: radial-gradient(circle at 50% 0%, #1a2236 0%, #040609 70%);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding-bottom: 60px;
        }

        /* Navbar Stylish */
        .abood-navbar {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--abood-purple);
            padding: 15px 0;
            position: sticky; top: 0; z-index: 999;
        }
        .brand-name {
            font-size: 1.8rem; font-weight: 900;
            background: linear-gradient(to right, #fff, var(--abood-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Live Stats Box */
        .live-stat-box {
            background: rgba(255, 0, 60, 0.15);
            border: 1px solid #ff003c;
            padding: 5px 15px;
            border-radius: 12px;
            font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
        }
        .view-number { color: #fff; font-family: sans-serif; }

        /* Match Panel - Horizontal Layout */
        .match-panel {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px 40px;
            margin: 35px 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .team-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .team-info.right { justify-content: flex-end; }
        .team-info.left { justify-content: flex-start; }
        
        .t-logo { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
        .t-name { font-size: 1.3rem; font-weight: 900; margin: 0; letter-spacing: 0.5px; }
        .vs-badge {
            background: linear-gradient(45deg, var(--abood-purple), var(--abood-cyan));
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-weight: 900; font-size: 1.2rem;
            margin: 0 30px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* Video Frame */
        .player-frame {
            background: #000;
            border-radius: 25px;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            position: relative;
        }
        
        /* تصميم المشغل المطور */
        .custom-video {
            width: 100%;
            height: 520px;
            border-radius: 20px;
            outline: none;
            background-color: #000;
        }

        /* Quality Buttons - Modern Grid */
        .quality-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px; margin-top: 30px;
        }
        .q-link-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 15px; border-radius: 15px;
            font-weight: 700; transition: all 0.4s ease;
            text-align: center; cursor: pointer; text-decoration: none;
            display: block; font-size: 1rem;
        }
        .q-link-btn:hover, .q-link-btn.active {
            background: linear-gradient(135deg, var(--abood-purple) 0%, var(--abood-cyan) 100%);
            border-color: transparent;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
            color: #000;
        }

        /* Telegram VIP Button Section */
        .telegram-section {
            margin-top: 40px;
            text-align: center;
        }
        .telegram-vip-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #0088cc 0%, #24a1de 100%);
            color: #fff;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.25rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(36, 161, 222, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
        }
        .telegram-vip-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(36, 161, 222, 0.6);
            color: #fff;
        }

        @media (max-width: 768px) {
            .match-panel { padding: 15px; gap: 10px; margin: 20px 0; }
            .t-name { font-size: 0.9rem; }
            .t-logo { width: 40px; height: 40px; }
            .vs-badge { width: 35px; height: 35px; font-size: 0.8rem; margin: 0 10px; }
            .custom-video { height: 250px; }
            .quality-container { grid-template-columns: repeat(2, 1fr); }
            .telegram-vip-btn { font-size: 1.1rem; padding: 14px 25px; }
        }
    </style>
</head>
<body>

    <nav class="abood-navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="brand-name">المبرمج لايف</div>
            <div class="live-stat-box">
                <i class="fas fa-satellite-dish fa-spin"></i>
                <span><span id="random-v" class="view-number">215.110</span> ألف مشاهد</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- لوحة المباراة بالأعلام والدول -->
        <div class="match-panel">
            <div class="team-info right">
                <h2 class="t-name">جمهورية العراق</h2>
                <img src="https://flagcdn.com/w160/iq.png" class="t-logo" alt="علم العراق">
            </div>

            <div class="vs-badge">VS</div>

            <div class="team-info left">
                <img src="https://flagcdn.com/w160/ad.png" class="t-logo" alt="علم أندورا">
                <h2 class="t-name">أندورا</h2>
            </div>
        </div>

        <!-- إطار الفيديو المطور والمشغل الذكي لشاشات الموبايل والكمبيوتر -->
        <div class="player-frame">
            <video id="my-video" class="custom-video" controls autoplay playsinline preload="auto" poster="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200"></video>
        </div>

        <!-- أزرار الجودة مرتبطة بالسكربت الذكي لتغيير الرابط عند الضغط -->
        <div class="quality-container">
            <div class="q-link-btn" onclick="applyLiveStream('http://205.237.105.25:8080/live/10176934593385/IxTopXNJ2oKhJy/255639.m3u8?token=bUbUbU.UcXz.X.Uayd.yczHbdcU.X.y.IQ.m3u8.24fe724a2fcdef2fb8bc4c37dd9fbd0b521ef750c0d4b3c59d40ae4941a57359...ZGFycHJvNGsuY29tOjgwODA=', this)">8K ULTRA</div>
            <div class="q-link-btn" onclick="applyLiveStream('http://205.237.105.25:8080/live/10176934593385/IxTopXNJ2oKhJy/255639.m3u8?token=bUbUbU.UcXz.X.Uayd.yczHbdcU.X.y.IQ.m3u8.24fe724a2fcdef2fb8bc4c37dd9fbd0b521ef750c0d4b3c59d40ae4941a57359...ZGFycHJvNGsuY29tOjgwODA=', this)">4K UHD</div>
            <div class="q-link-btn active" onclick="applyLiveStream('http://205.237.105.25:8080/live/10176934593385/IxTopXNJ2oKhJy/255639.m3u8?token=bUbUbU.UcXz.X.Uayd.yczHbdcU.X.y.IQ.m3u8.24fe724a2fcdef2fb8bc4c37dd9fbd0b521ef750c0d4b3c59d40ae4941a57359...ZGFycHJvNGsuY29tOjgwODA=', this)">FULL HD</div>
            <div class="q-link-btn" onclick="applyLiveStream('http://205.237.105.25:8080/live/10176934593385/IxTopXNJ2oKhJy/255639.m3u8?token=bUbUbU.UcXz.X.Uayd.yczHbdcU.X.y.IQ.m3u8.24fe724a2fcdef2fb8bc4c37dd9fbd0b521ef750c0d4b3c59d40ae4941a57359...ZGFycHJvNGsuY29tOjgwODA=', this)">SD 480p</div>
        </div>

        <!-- زر التليكرام الخاص بقناة المبرمج لايف -->
        <div class="telegram-section">
            <a href="https://t.me/live4kz" target="_blank" class="telegram-vip-btn">
                <i class="fab fa-telegram-plane"></i> &nbsp;
                اضغط هنا لمتابعة الأهداف على قناة المبرمج لايف
            </a>
        </div>

        <div class="text-center mt-5">
            <p class="text-muted small">تصميم شبكة المبرمج لايف &copy; 2026 - جودة بلا حدود</p>
        </div>
    </div>

    <script>
        var video = document.getElementById('my-video');
        var defaultUrl = "http://205.237.105.25:8080/live/10176934593385/IxTopXNJ2oKhJy/255639.m3u8?token=bUbUbU.UcXz.X.Uayd.yczHbdcU.X.y.IQ.m3u8.24fe724a2fcdef2fb8bc4c37dd9fbd0b521ef750c0d4b3c59d40ae4941a57359...ZGFycHJvNGsuY29tOjgwODA=";
        var hls;

        // دالة تشغيل البث وإجبار التوافقية الشغالة 100%
        function applyLiveStream(url, element) {
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); // إنهاء البث السابق لتسريع التنقل
                }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // دعم هواتف الآيفون ومتصفح سفاري بشكل مباشر
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }

            // تحديث تصميم أزرار الجودة النشطة
            if(element) {
                document.querySelectorAll('.q-link-btn').forEach(btn => btn.classList.remove('active'));
                element.classList.add('active');
            }
        }

        // تشغيل البث تلقائياً عند تحميل الصفحة
        document.addEventListener("DOMContentLoaded", function() {
            applyLiveStream(defaultUrl, null);
        });

        // عداد المشاهدات العشوائي المتطور لزيادة تفاعل الصفحة
        function updateCounter() {
            let randomDec = Math.floor(Math.random() * 900) + 100; 
            let randomBase = Math.floor(Math.random() * (240 - 200 + 1)) + 200; 
            document.getElementById('random-v').innerText = randomBase + "." + randomDec;
        }
        setInterval(updateCounter, 3000);
        updateCounter();
    </script>
</body>
</html>
