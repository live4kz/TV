<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباراة العراق وأندورا - مباشر</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 900px;
            text-align: center;
        }

        h1 {
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .video-wrapper {
            position: relative;
            padding-top: 56.25%; /* نسبة 16:9 */
            background: #000;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .btn-telegram {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
        }

        .btn-telegram:hover {
            background-color: #00aaff;
            transform: scale(1.05);
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #4CAF50;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🇮🇶 بث مباراة العراق ضد أندورا 🇦🇩</h1>
        
        <div class="video-wrapper">
            <video id="video" controls autoplay playsinline poster="https://via.placeholder.com/800x450/000000/FFFFFF?text=Loading+Live+Stream..."></video>
        </div>

        <p class="status">● البث يعمل الآن بجودة عالية</p>

        <a href="https://t.me/live4kz" target="_blank" class="btn-telegram">
            انضم لقناتنا على تليجرام 📡
        </a>
    </div>

    <script>
        var video = document.getElementById('video');
        // رابط البث الخاص بك
        var videoSrc = 'http://89.47.232.196:8080/live/Waielxsafwatx/sm03111206/5932.m3u8?token=cdcHcU.Uycy.X.dcXz.yczHbdcU.X.y.IQ.m3u8.e4e6ba6d83e7d5ce3589a8f26b059b822d77331b750b9386d4d866dbf612856d...YXJvbWF0di5jbw==';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        }
        // للمتصفحات التي تدعم m3u8 بشكل طبيعي مثل Safari على الآيفون
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>

</body>
</html>
